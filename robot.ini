# Robot Framework Configuration
# This file can be used to set default Robot Framework options

# Default output directory
--outputdir results

# Default log level
--loglevel INFO

# Include tags (uncomment to run only specific tags by default)
# --include smoke

# Exclude tags (uncomment to exclude specific tags)
# --exclude skip

# Test execution timeout
# --testtimeout 5min

# Variable files (if needed)
# --variablefile variables.py

# Resource files (if needed globally)
# --resource resources/common_keywords.robot

