name: ShieldDrive CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Telematics Backend
        run: |
          python server.py &
          # Wait for server to be ready
          timeout 30s bash -c 'until curl -s localhost:5001/vehicles; do sleep 1; done'

      - name: Run E2E Tests
        run: |
          # Use headlesschrome for CI environments
          robot -d results -v BROWSER:headlesschrome tests/fleet_tests.robot

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-test-results
          path: |
            results/
            *.png
